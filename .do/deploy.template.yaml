spec:
  name: supabase-app
  # Optionally you can chose a region where the deployment will be hosted
  # Otherwise, DO will chose the nearest region for you in the wizard
  # region: nyc

  ingress:
    rules:
      - match:
          path:
            prefix: /rest/v1
        component:
          name: rest
          rewrite: /
      - match:
          path:
            prefix: /auth/v1
        component:
          name: auth
          rewrite: /
      - match:
          path:
            prefix: /storage/v1
        component:
          name: storage
          rewrite: /
      - match:
          path:
            prefix: /realtime/v1
        component:
          name: realtime
          # Trim Prefix (no rewrite): /realtime/v1/socket/websocket → /socket/websocket

  services:
    # PostgREST - REST API for PostgreSQL
    - name: rest
      image:
        registry_type: DOCKER_HUB
        registry: postgrest
        repository: postgrest
        tag: v12.2.3
      http_port: 3000
      instance_size_slug: apps-d-1vcpu-1gb
      # instance_count: 2  # If autoscaling is disabled, uncomment and set instance_count (required)

      autoscaling:
        min_instance_count: 1
        max_instance_count: 3
        metrics:
          cpu:
            percent: 70

      health_check:
        http_path: /
        initial_delay_seconds: 10
        period_seconds: 10
        timeout_seconds: 3
        failure_threshold: 3
        success_threshold: 1

      envs:
        - key: PGRST_DB_URI
          value: ${supabase-db.DATABASE_URL}
        - key: PGRST_DB_SCHEMAS
          value: public
        - key: PGRST_DB_ANON_ROLE
          value: anon
        - key: PGRST_DB_POOL
          value: "10"
        - key: PGRST_SERVER_PORT
          value: "3000"
        - key: PGRST_JWT_SECRET
          type: SECRET
          value: <REQUIRED>
        - key: PGRST_JWT_AUD
          value: authenticated

        # Template Tracking (for DigitalOcean analytics)
        - key: APPPLAT_BASE_TEMPLATE
          value: "supabase"
        - key: APPPLAT_TEMPLATE_TYPE
          value: "production"
        - key: APPPLAT_TEMPLATE_COMMIT_SHA
          value: ${_self.COMMIT_HASH}

    # GoTrue - Authentication Service
    - name: auth
      image:
        registry_type: DOCKER_HUB
        registry: supabase
        repository: gotrue
        tag: v2.155.1
      http_port: 9999
      instance_size_slug: apps-d-1vcpu-2gb
      # instance_count: 2  # If autoscaling is disabled, uncomment and set instance_count (required)

      autoscaling:
        min_instance_count: 1
        max_instance_count: 3
        metrics:
          cpu:
            percent: 70

      health_check:
        http_path: /health
        initial_delay_seconds: 20
        period_seconds: 10
        timeout_seconds: 3
        failure_threshold: 3
        success_threshold: 1

      envs:
        - key: GOTRUE_API_HOST
          value: "0.0.0.0"
        - key: GOTRUE_API_PORT
          value: "9999"
        - key: GOTRUE_DB_DRIVER
          value: postgres
        - key: GOTRUE_DB_DATABASE_URL
          type: SECRET
          value: ${supabase-db.DATABASE_URL}
        - key: GOTRUE_SITE_URL
          value: ${APP_URL}
        - key: GOTRUE_URI_ALLOW_LIST
          value: ${APP_URL}
        - key: GOTRUE_JWT_SECRET
          type: SECRET
          value: <REQUIRED>
        - key: GOTRUE_JWT_EXP
          value: "3600"
        - key: GOTRUE_JWT_AUD
          value: authenticated
        - key: GOTRUE_JWT_DEFAULT_GROUP_NAME
          value: authenticated
        - key: GOTRUE_DISABLE_SIGNUP
          value: "false"
        - key: API_EXTERNAL_URL
          value: ${APP_URL}
        # Email configuration
        # Auto-confirm allows signups without email verification
        # To enable email verification/password reset emails, add SMTP configuration
        # (GOTRUE_SMTP_HOST, GOTRUE_SMTP_PORT, GOTRUE_SMTP_USER, GOTRUE_SMTP_PASS, GOTRUE_SMTP_ADMIN_EMAIL)
        - key: GOTRUE_MAILER_AUTOCONFIRM
          value: "true"
        - key: GOTRUE_RATE_LIMIT_EMAIL_SENT
          value: "10"
        - key: GOTRUE_RATE_LIMIT_SMS_SENT
          value: "10"

    # Storage - File Management Service
    - name: storage
      image:
        registry_type: DOCKER_HUB
        registry: supabase
        repository: storage-api
        tag: v1.33.0
      http_port: 5000
      instance_size_slug: apps-d-1vcpu-1gb
      # instance_count: 2  # If autoscaling is disabled, uncomment and set instance_count (required)

      autoscaling:
        min_instance_count: 1
        max_instance_count: 3
        metrics:
          cpu:
            percent: 70

      health_check:
        http_path: /status
        initial_delay_seconds: 60
        period_seconds: 10
        timeout_seconds: 5
        failure_threshold: 5
        success_threshold: 1

      envs:
        - key: SERVER_PORT
          value: "5000"
        - key: ANON_KEY
          type: SECRET
          value: <REQUIRED>
        - key: SERVICE_KEY
          type: SECRET
          value: <REQUIRED>
        - key: POSTGREST_URL
          value: http://rest:3000
        - key: PGRST_JWT_SECRET
          type: SECRET
          value: <REQUIRED>
        - key: DATABASE_URL
          type: SECRET
          value: ${supabase-db.DATABASE_URL}
        - key: DB_SSL
          value: "true"
        - key: NODE_TLS_REJECT_UNAUTHORIZED
          value: "0"
        - key: FILE_SIZE_LIMIT
          value: "52428800"
        - key: STORAGE_BACKEND
          value: s3
        - key: TENANT_ID
          value: stub
        # DigitalOcean Spaces configuration
        # Create Spaces bucket manually at: https://cloud.digitalocean.com/spaces/new
        # Example bucket name: supabase-storage-space
        - key: GLOBAL_S3_BUCKET
          value: <REQUIRED>  # e.g., "supabase-storage-space"
        - key: REGION
          value: <REQUIRED>  # e.g., "nyc3"
        - key: GLOBAL_S3_ENDPOINT
          value: <REQUIRED>  # e.g., "https://nyc3.digitaloceanspaces.com"
        - key: AWS_ACCESS_KEY_ID
          type: SECRET
          value: <REQUIRED>
        - key: AWS_SECRET_ACCESS_KEY
          type: SECRET
          value: <REQUIRED>

    # Realtime - WebSocket Server for Real-time Subscriptions
    - name: realtime
      image:
        registry_type: DOCKER_HUB
        registry: supabase
        repository: realtime
        tag: v2.76.5
      http_port: 4000
      instance_size_slug: apps-d-1vcpu-2gb
      # instance_count: 2  # If autoscaling is disabled, uncomment and set instance_count (required)

      autoscaling:
        min_instance_count: 1
        max_instance_count: 3
        metrics:
          cpu:
            percent: 70

      health_check:
        http_path: /
        initial_delay_seconds: 20
        period_seconds: 10
        timeout_seconds: 3
        failure_threshold: 3
        success_threshold: 1

      envs:
        - key: PORT
          value: "4000"
        - key: DB_HOST
          value: ${supabase-db.HOSTNAME}
        - key: DB_PORT
          value: ${supabase-db.PORT}
        - key: DB_USER
          value: supabase_admin
        - key: DB_NAME
          value: ${supabase-db.DATABASE}
        - key: DB_PASSWORD
          type: SECRET
          value: ${supabase-db.PASSWORD}
        - key: DB_SSL
          value: "true"
        - key: DB_AFTER_CONNECT_QUERY
          value: "SET search_path TO _realtime"
        - key: DB_IP_VERSION
          value: "ipv4"
        - key: ERL_AFLAGS
          value: "-proto_dist inet_tcp"
        # ── Cluster isolation ──
        # DNS strategy with no peers = single-node mode (no Erlang peer discovery).
        - key: CLUSTER_STRATEGIES
          value: "DNS"
        - key: DNS_NODES
          value: ""
        - key: APP_NAME
          value: "realtime-managed"
        - key: GEN_RPC_TCP_SERVER_PORT
          value: "5370"
        # ── Replication slot isolation ──
        - key: TEMPORARY_SLOT
          value: "true"
        - key: SLOT_NAME
          value: "supabase_realtime_slot_managed"
        - key: PUBLICATIONS
          value: "supabase_realtime"
        - key: DB_ENC_KEY
          type: SECRET
          value: <REQUIRED>
        - key: API_JWT_SECRET
          type: SECRET
          value: <REQUIRED>
        - key: SECRET_KEY_BASE
          type: SECRET
          value: <REQUIRED>
        - key: SEED_SELF_HOST
          value: "true"
        - key: SELF_HOST_TENANT_NAME
          value: supabase  # must match first subdomain of public hostname (supabase.epoptia.io → "supabase")
        - key: REPLICATION_MODE
          value: RLS
        - key: RUN_JANITOR
          value: "true"
        - key: DISABLE_HEALTHCHECK_LOGGING
          value: "true"
        - key: RLIMIT_NOFILE
          value: "65536"

  workers:
    # ── Epoptia Realtime Bridge ──────────────────────────────────────────────────
    # CDC bridge: watches Postgres for changes and publishes to Realtime channels.
    # Worker type = outbound-only. Connects TO Realtime — never receives connections.
    # Reaches Realtime at http://realtime:4000 on the App Platform private network.
    - name: realtime-bridge
      image:
        registry_type: DOCR
        registry: epoptia4-container
        repository: supabase-realtime-bridge
        tag: prod
      instance_size_slug: basic-xs
      instance_count: 1
      envs:
        - key: NODE_ENV
          value: "production"
        - key: PORT
          value: "3011"
        # ── Bridge behaviour ──
        # emit = subscribe to Postgres changes AND forward to Realtime broadcast.
        # observe = subscribe only (read-only monitoring, no emission).
        - key: SUPABASE_BRIDGE_MODE
          value: "emit"
        - key: SUPABASE_BRIDGE_EMIT_TARGET
          value: "supabase"
        - key: SUPABASE_BRIDGE_BROADCAST_CHANNEL_PREFIX
          value: "cdc"
        # SaaS: auto-discover tenants from public.customers.subdomain
        - key: SUPABASE_TENANT_DISCOVERY
          value: "customers"
        # Internal Realtime URL (private network)
        - key: SUPABASE_URL
          value: "http://realtime:4000"
        # Public URL — used by TenantAwareWebSocket to inject the correct Host header
        - key: SUPABASE_PUBLIC_URL
          value: <REQUIRED>  # e.g., "https://supabase.epoptia.io"
        - key: DATABASE_URL
          value: ${supabase-db.DATABASE_URL}
          type: SECRET
        - key: DATABASE_URL_DEFAULTDB
          value: ${supabase-db.DATABASE_URL}
          type: SECRET
        # Supabase auth for publishing to Realtime broadcast channels.
        - key: SUPABASE_ANON_KEY
          value: "<REQUIRED>"
          type: SECRET
        - key: SUPABASE_SERVICE_ROLE_KEY
          value: "<REQUIRED>"
          type: SECRET
        - key: SUPABASE_REALTIME_JWT
          value: "<REQUIRED>"
          type: SECRET

  jobs:
    # Database Initialization (runs before services start)
    - name: db-init
      git:
        repo_clone_url: https://github.com/AppPlatform-Templates/supabase-appplatform.git
        branch: main
      kind: PRE_DEPLOY
      dockerfile_path: db-init/Dockerfile.dbinit
      instance_count: 1
      instance_size_slug: apps-s-1vcpu-0.5gb

      envs:
        - key: DATABASE_URL
          type: SECRET
          value: ${supabase-db.DATABASE_URL}
        - key: SELF_HOST_TENANT_NAME
          value: supabase  # must match Realtime service's SELF_HOST_TENANT_NAME

  databases:
    - name: supabase-db
      engine: PG
      production: true
      version: "18"
      cluster_name: supabase-db
